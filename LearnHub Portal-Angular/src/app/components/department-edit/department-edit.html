<h2 class="text-2xl font-bold mb-4">Edit Department</h2>

<form (ngSubmit)="updateDepartment()" class="space-y-4 max-w-md">
    <div>
        <label>Name:</label>
        <input type="text" [(ngModel)]="department.name" name="name" required class="border p-2 w-full">
    </div>

    <button type="submit" class="bg-green-500 text-white px-4 py-2 rounded">Update</button>
</form>
