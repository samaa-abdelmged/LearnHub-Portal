<h2 class="text-2xl font-bold mb-4">Students</h2>

<table class="w-full border border-gray-300">
    <thead>
        <tr class="bg-gray-200">
            <th class="p-2 border">ID</th>
            <th class="p-2 border">Name</th>
            <th class="p-2 border">Age</th>
            <th class="p-2 border">Department</th>
            <th class="p-2 border">Actions</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let student of students">
            <td class="p-2 border">{{ student.id }}</td>
            <td class="p-2 border">{{ student.name }}</td>
            <td class="p-2 border">{{ student.age }}</td>
            <td class="p-2 border">{{ student.department?.name }}</td>
            <td class="p-2 border">
                <button (click)="editStudent(student.id)" class="bg-yellow-400 px-2 py-1 rounded mr-2">Edit</button>
                <button (click)="deleteStudent(student.id)"
                    class="bg-red-500 px-2 py-1 rounded text-white">Delete</button>
            </td>
        </tr>
    </tbody>
</table>
