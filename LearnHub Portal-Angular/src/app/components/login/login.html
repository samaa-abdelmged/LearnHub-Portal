<h2 class="text-2xl font-bold mb-4">Login</h2>

<form (ngSubmit)="login()" class="space-y-4 max-w-md">
    <div>
        <label>Username:</label>
        <input type="text" [(ngModel)]="username" name="username" required class="border p-2 w-full">
    </div>

    <div>
        <label>Password:</label>
        <input type="password" [(ngModel)]="password" name="password" required class="border p-2 w-full">
    </div>

    <div *ngIf="errorMessage" class="text-red-500">{{ errorMessage }}</div>

    <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded">Login</button>
</form>
