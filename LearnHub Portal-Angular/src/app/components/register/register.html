<h2 class="text-2xl font-bold mb-4">Register</h2>

<form (ngSubmit)="register()" class="space-y-4 max-w-md">
    <div>
        <label>Username:</label>
        <input type="text" [(ngModel)]="username" name="username" required class="border p-2 w-full">
    </div>

    <div>
        <label>Password:</label>
        <input type="password" [(ngModel)]="password" name="password" required class="border p-2 w-full">
    </div>

    <div>
        <label>Role:</label>
        <select [(ngModel)]="role" name="role" class="border p-2 w-full">
            <option value="User">User</option>
            <option value="Admin">Admin</option>
        </select>
    </div>

    <div *ngIf="errorMessage" class="text-red-500">{{ errorMessage }}</div>

    <button type="submit" class="bg-green-500 text-white px-4 py-2 rounded">Register</button>
</form>
