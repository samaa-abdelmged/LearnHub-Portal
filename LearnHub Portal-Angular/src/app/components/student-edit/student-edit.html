<h2 class="text-2xl font-bold mb-4">Edit Student</h2>

<form (ngSubmit)="updateStudent()" class="space-y-4 max-w-md">
    <div>
        <label>Name:</label>
        <input type="text" [(ngModel)]="student.name" name="name" required class="border p-2 w-full">
    </div>

    <div>
        <label>Age:</label>
        <input type="number" [(ngModel)]="student.age" name="age" required class="border p-2 w-full">
    </div>

    <div>
        <label>Department:</label>
        <select [(ngModel)]="student.departmentId" name="departmentId" required class="border p-2 w-full">
            <option *ngFor="let d of departments" [value]="d.id">{{ d.name }}</option>
        </select>
    </div>

    <button type="submit" class="bg-green-500 text-white px-4 py-2 rounded">Update</button>
</form>
