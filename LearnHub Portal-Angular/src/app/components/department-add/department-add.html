<h2 class="text-2xl font-bold mb-4">Add Department</h2>

<form (ngSubmit)="addDepartment()" class="space-y-4 max-w-md">
    <div>
        <label>Name:</label>
        <input type="text" [(ngModel)]="department.name" name="name" required class="border p-2 w-full">
    </div>

    <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded">Add</button>
</form>
